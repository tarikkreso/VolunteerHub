name: volunteer_hub_desktop
description: VolunteerHub Desktop Admin App - Organization management

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
    
  # State management
  provider: ^6.1.1
  
  # HTTP client
  dio: ^5.4.0
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # Data tables
  data_table_2: ^2.5.10
  
  # Charts for reports
  fl_chart: ^0.66.2
  
  # Calendar
  table_calendar: ^3.0.9
  
  # File handling
  file_picker: ^6.1.1
  
  # PDF generation for reports
  pdf: ^3.10.7
  printing: ^5.12.0
  
  # UI components
  flutter_spinkit: ^5.2.0
  cached_network_image: ^3.3.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  
  # Utils
  intl: ^0.18.1
  json_annotation: ^4.8.1
  
  # Icons
  cupertino_icons: ^1.0.6
  
  # Window management
  window_manager: ^0.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
