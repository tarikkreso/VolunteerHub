name: volunteer_hub_mobile
description: VolunteerHub Mobile App - Volunteer management platform

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
    
  # State management
  provider: ^6.1.1
  
  # HTTP client
  dio: ^5.4.0
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  
  # Stripe payments
  flutter_stripe: ^10.1.1
  
  # UI components
  flutter_spinkit: ^5.2.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  
  # Deep links
  app_links: ^6.0.0

  # Utils
  intl: ^0.18.1
  json_annotation: ^4.8.1
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
